name: AI PR Pre-Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
      contents: read
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Pre-Review
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { execSync } = require('child_process');

            const pr = context.payload.pull_request;
            const prBody = pr.body || '';
            const prTitle = pr.title || '';

            // ── 1. PR Title Format Check ──────────────────────────────────
            // Expected: [SprintN][Type] Description — #number
            const titleRegex = /^\[Sprint\d+\]\[(Frontend|Backend|Report|DevOps|Scrum|Full-?Stack)\].+—\s*#\d+$/i;
            const titleValid = titleRegex.test(prTitle.trim());

            let titleWarning = '';
            if (!titleValid) {
              titleWarning = `> ⚠️ **PR title does not follow the required format.**
> Expected: \`[SprintN][Type] Short description — #issue_number\`
> Got: \`${prTitle}\`
> Please rename this PR before requesting human review. See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).

---
`;
            }

            // ── 2. Find linked issue ──────────────────────────────────────
            const issueMatch = prBody.match(/(?:closes?|fixes?|resolves?)\s+#(\d+)/i);
            let issueContext = '⚠️ No linked issue found. Add `Closes #xx` to the PR description.';
            let issueLabel = 'No linked issue';

            if (issueMatch) {
              const issueNumber = parseInt(issueMatch[1]);
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });
                issueContext = `**Issue #${issueNumber}: ${issue.data.title}**\n\n${issue.data.body || 'No description.'}`;
                issueLabel = `#${issueNumber}`;
              } catch (e) {
                issueContext = `⚠️ Could not fetch issue #${issueNumber}. Make sure the issue exists.`;
              }
            }

            // ── 3. Get PR diff ────────────────────────────────────────────
            let diff = '';
            try {
              diff = execSync(
                `git diff origin/${pr.base.ref}...HEAD -- . ':(exclude)package-lock.json' ':(exclude)*.lock' ':(exclude)*.snap'`,
                { maxBuffer: 1024 * 1024 * 10 }
              ).toString().slice(0, 15000);
            } catch (e) {
              diff = 'Could not retrieve diff: ' + e.message;
            }

            if (!diff.trim()) {
              diff = 'No code changes detected in this PR.';
            }

            // ── 4. Call GitHub Models API (GPT-4o) ────────────────────────
            const response = await fetch(
              'https://models.github.ai/inference/chat/completions',
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                  model: 'openai/gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a senior software engineer doing a pre-review of a pull request for a university group project (React + Java Spring Boot). Be concise, specific, and actionable. Use markdown formatting. Focus on what matters for the acceptance criteria.'
                    },
                    {
                      role: 'user',
                      content: `Please review this PR against the linked issue's acceptance criteria.

## Linked Issue / Acceptance Criteria
${issueContext}

## PR Title
${prTitle}

## Code Diff
\`\`\`diff
${diff}
\`\`\`

Respond using this exact structure:

### ✅ Requirements Met
List which acceptance criteria from the issue are clearly satisfied by the diff.

### ❌ Missing or Incomplete
List which acceptance criteria are NOT addressed yet. Be specific about what is missing.

### ⚠️ Code Quality Issues
List bugs, missing error handling, hardcoded values, or bad practices found in the diff. Skip this section if there are none.

### 💡 Suggestions
Optional improvements that are not blockers. Skip if none.

### 📋 Verdict
One of: **Ready for human review** · **Needs minor fixes** · **Needs significant work**
One sentence explaining why.`
                    }
                  ],
                  max_tokens: 1500
                })
              }
            );

            const data = await response.json();

            // ── 5. Handle API errors ──────────────────────────────────────
            if (!response.ok) {
              console.error('GitHub Models API error:', JSON.stringify(data));
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `## 🤖 AI Pre-Review\n\n${titleWarning}❌ AI review failed: \`${data.error?.message || JSON.stringify(data)}\`\n\nPlease check the [Actions log](../actions) for details.`
              });
              return;
            }

            const reviewText = data.choices?.[0]?.message?.content || 'No response received from model.';

            // ── 6. Post PR comment ────────────────────────────────────────
            const timestamp = new Date().toUTCString();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `## 🤖 AI Pre-Review Report

${titleWarning}> Linked issue: **${issueLabel}** · Model: GPT-4o · ${timestamp}

---

${reviewText}

---

*This is an automated pre-review. Please address any ❌ and ⚠️ items above before requesting human review from the leads.*`
            });
