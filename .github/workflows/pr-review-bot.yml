name: AI PR Pre-Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
      contents: read
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Pre-Review
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { execSync } = require('child_process');

            const pr = context.payload.pull_request;
            const prBody = pr.body || '';
            const prTitle = pr.title || '';

            // ── 1. PR Title Format Check ──────────────────────────────────
            const titleRegex = /^\[Sprint\d+\]\[(Frontend|Backend|Report|DevOps|Scrum|Full-?Stack)\].+—\s*#\d+$/i;
            const titleValid = titleRegex.test(prTitle.trim());

            let titleWarning = '';
            if (!titleValid) {
              titleWarning = `> ⚠️ **PR title does not follow the required format.**
> Expected: \`[SprintN][Type] Short description — #issue_number\`
> Got: \`${prTitle}\`
> Please rename this PR before requesting human review. See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).

---
`;
            }

            // ── 2. Find ALL linked issues ─────────────────────────────────
            // Matches: Closes #1, Fixes #2, Resolves #3 (anywhere in body)
            const issueMatches = [...prBody.matchAll(/(?:closes?|fixes?|resolves?)\s+#(\d+)/gi)];
            const issueNumbers = [...new Set(issueMatches.map(m => parseInt(m[1])))];

            let issueContext = '';
            let issueLabel = 'No linked issue';

            if (issueNumbers.length === 0) {
              issueContext = '⚠️ No linked issues found. Add `Closes #xx` to the PR description for each related issue.';
              issueLabel = 'No linked issues';
            } else {
              issueLabel = issueNumbers.map(n => `#${n}`).join(', ');
              const issueBlocks = [];

              for (const num of issueNumbers) {
                try {
                  const issue = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num
                  });
                  issueBlocks.push(
                    `### Issue #${num}: ${issue.data.title}\n\n${issue.data.body || 'No description.'}`
                  );
                } catch (e) {
                  issueBlocks.push(`### Issue #${num}\n\n⚠️ Could not fetch — make sure this issue exists.`);
                }
              }

              issueContext = issueBlocks.join('\n\n---\n\n');
            }

            // ── 3. Get PR diff ────────────────────────────────────────────
            let diff = '';
            try {
              diff = execSync(
                `git diff origin/${pr.base.ref}...HEAD -- . ':(exclude)package-lock.json' ':(exclude)*.lock' ':(exclude)*.snap'`,
                { maxBuffer: 1024 * 1024 * 10 }
              ).toString().slice(0, 15000);
            } catch (e) {
              diff = 'Could not retrieve diff: ' + e.message;
            }

            if (!diff.trim()) {
              diff = 'No code changes detected in this PR.';
            }

            // ── 4. Call GitHub Models API (GPT-4o) ────────────────────────
            const multiIssueNote = issueNumbers.length > 1
              ? `Note: This PR covers ${issueNumbers.length} issues (${issueLabel}). Review each issue's requirements separately.`
              : '';

            const reviewFormat = issueNumbers.length > 1
              ? `Since this PR covers multiple issues, structure your review like this:

For each issue, provide a section:
**Issue #N — [issue title]**
- ✅ Requirements Met: which acceptance criteria are satisfied
- ❌ Missing / Incomplete: which are not addressed yet

Then a combined section at the end:

### ⚠️ Code Quality Issues
Bugs, missing error handling, bad practices across the whole diff. Skip if none.

### 💡 Suggestions
Optional improvements. Skip if none.

### 📋 Verdict
One of: **Ready for human review** · **Needs minor fixes** · **Needs significant work**
One sentence explaining why.`
              : `Provide your review in this exact format:

### ✅ Requirements Met
Which acceptance criteria are satisfied.

### ❌ Missing or Incomplete
Which criteria are NOT addressed.

### ⚠️ Code Quality Issues
Bugs, missing error handling, bad practices. Skip if none.

### 💡 Suggestions
Optional improvements. Skip if none.

### 📋 Verdict
One of: **Ready for human review** · **Needs minor fixes** · **Needs significant work**
One sentence explaining why.`;

            const response = await fetch(
              'https://models.github.ai/inference/chat/completions',
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                  model: 'openai/gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a senior software engineer doing a pre-review of a pull request for a university group project (React + Java Spring Boot). Be concise, specific, and actionable. Use markdown formatting.'
                    },
                    {
                      role: 'user',
                      content: `Please review this PR against the linked issue requirements. ${multiIssueNote}

## Linked Issues / Acceptance Criteria
${issueContext}

## PR Title
${prTitle}

## Code Diff
\`\`\`diff
${diff}
\`\`\`

${reviewFormat}`
                    }
                  ],
                  max_tokens: 2000
                })
              }
            );

            const data = await response.json();

            // ── 5. Handle API errors ──────────────────────────────────────
            if (!response.ok) {
              console.error('GitHub Models API error:', JSON.stringify(data));
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `## 🤖 AI Pre-Review\n\n${titleWarning}❌ AI review failed: \`${data.error?.message || JSON.stringify(data)}\`\n\nCheck the [Actions log](../actions) for details.`
              });
              return;
            }

            const reviewText = data.choices?.[0]?.message?.content || 'No response received from model.';

            // ── 6. Post PR comment ────────────────────────────────────────
            const issueCountNote = issueNumbers.length > 1
              ? ` · **${issueNumbers.length} issues reviewed:** ${issueLabel}`
              : ` · Linked issue: **${issueLabel}**`;

            const timestamp = new Date().toUTCString();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `## 🤖 AI Pre-Review Report

${titleWarning}> Model: GPT-4o${issueCountNote} · ${timestamp}

---

${reviewText}

---

*Automated pre-review. Please address ❌ and ⚠️ items before requesting human review from the leads.*`
            });
