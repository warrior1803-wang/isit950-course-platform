name: AI PR Pre-Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
      contents: read
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Pre-Review
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const pr = context.payload.pull_request;
            const prBody = pr.body || '';
            const prTitle = pr.title || '';

            // ── 1. PR Title Format Check ──────────────────────────────────
            const titleRegex = /^\[Sprint\d+\]\[(Frontend|Backend|Report|DevOps|Scrum|Full-?Stack)\].+\u2014\s*#\d+$/i;
            const titleValid = titleRegex.test(prTitle.trim());

            let titleWarning = '';
            if (!titleValid) {
              titleWarning = '> \u26a0\ufe0f **PR title does not follow the required format.**\n'
                + '> Expected: `[SprintN][Type] Short description \u2014 #issue_number`\n'
                + '> Got: `' + prTitle + '`\n'
                + '> Please rename this PR before requesting human review. See [README.md](../blob/main/README.md).\n\n---\n';
            }

            // ── 2. Find ALL linked issues ─────────────────────────────────
            const issueMatches = [...prBody.matchAll(/(?:closes?|fixes?|resolves?)\s+#(\d+)/gi)];
            const issueNumbers = [...new Set(issueMatches.map(m => parseInt(m[1])))];

            let issueContext = '';
            let issueLabel = 'No linked issue';

            if (issueNumbers.length === 0) {
              issueContext = '\u26a0\ufe0f No linked issues found. Add `Closes #xx` to the PR description for each related issue.';
              issueLabel = 'No linked issues';
            } else {
              issueLabel = issueNumbers.map(n => '#' + n).join(', ');
              const issueBlocks = [];

              for (const num of issueNumbers) {
                try {
                  const issue = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num
                  });
                  issueBlocks.push('### Issue #' + num + ': ' + issue.data.title + '\n\n' + (issue.data.body || 'No description.'));
                } catch (e) {
                  issueBlocks.push('### Issue #' + num + '\n\n\u26a0\ufe0f Could not fetch \u2014 make sure this issue exists.');
                }
              }

              issueContext = issueBlocks.join('\n\n---\n\n');
            }

            // ── 3. Get changed files list ─────────────────────────────────
            let changedFiles = [];
            try {
              changedFiles = execSync(
                "git diff origin/" + pr.base.ref + "...HEAD --name-only -- . ':(exclude)package-lock.json' ':(exclude)*.lock' ':(exclude)*.snap'",
                { maxBuffer: 1024 * 1024 * 10 }
              ).toString().trim().split('\n').filter(Boolean);
            } catch (e) {
              console.error('Could not get changed files:', e.message);
            }

            // ── 4. Read full content of changed files (cap at 12000 chars total) ──
            let fullFileContents = '';
            let totalChars = 0;
            const FILE_TOTAL_CAP = 4000;

            for (const file of changedFiles) {
              if (totalChars >= FILE_TOTAL_CAP) break;
              try {
                const content = fs.readFileSync(file, 'utf8');
                const block = '\n\n### 📄 Full file: ' + file + '\n```\n' + content + '\n```';
                if (totalChars + block.length > FILE_TOTAL_CAP) {
                  // Add truncated version
                  const remaining = FILE_TOTAL_CAP - totalChars;
                  fullFileContents += '\n\n### 📄 Full file: ' + file + ' (truncated)\n```\n' + content.slice(0, remaining) + '\n... [truncated]\n```';
                  totalChars = FILE_TOTAL_CAP;
                } else {
                  fullFileContents += block;
                  totalChars += block.length;
                }
              } catch (e) {
                // File might be deleted or binary, skip
              }
            }

            // ── 5. Auto-fetch related backend files for frontend changes ──
            let backendContext = '';
            const frontendChanged = changedFiles.some(f =>
              f.includes('frontend/') || f.endsWith('.jsx') || f.endsWith('.tsx')
            );

            if (frontendChanged) {
              // Extract keywords from changed frontend filenames to find related backend files
              const keywords = changedFiles
                .filter(f => f.includes('frontend/'))
                .map(f => {
                  const name = f.split('/').pop().replace(/\.(jsx|tsx|js|ts)$/, '');
                  // Convert PascalCase to search terms e.g. AssignmentSubmission -> Assignment
                  return name.replace(/([A-Z])/g, ' $1').trim().split(' ')[0];
                })
                .filter(Boolean);

              const uniqueKeywords = [...new Set(keywords)];

              // Search for related backend files
              const backendBlocks = [];
              let backendChars = 0;
              const BACKEND_CAP = 2000;

              for (const keyword of uniqueKeywords) {
                if (backendChars >= BACKEND_CAP) break;
                try {
                  const matches = execSync(
                    `find backend/src -name "*${keyword}*.java" 2>/dev/null | head -3`,
                    { maxBuffer: 1024 * 1024 }
                  ).toString().trim().split('\n').filter(Boolean);

                  for (const backendFile of matches) {
                    if (backendChars >= BACKEND_CAP) break;
                    try {
                      const content = fs.readFileSync(backendFile, 'utf8');
                      const block = '\n\n### ☕ Related backend: ' + backendFile + '\n```java\n' + content.slice(0, 1500) + (content.length > 1500 ? '\n... [truncated]' : '') + '\n```';
                      backendBlocks.push(block);
                      backendChars += block.length;
                    } catch (e) {}
                  }
                } catch (e) {}
              }

              if (backendBlocks.length > 0) {
                backendContext = '\n\n## Related Backend Files (auto-fetched for context)\n'
                  + '> These files were NOT changed in this PR — included so the reviewer understands the full system behaviour.\n'
                  + backendBlocks.join('');
              }
            }

            // ── 6. Get PR diff (for reference) ───────────────────────────
            let diff = '';
            try {
              diff = execSync(
                "git diff origin/" + pr.base.ref + "...HEAD -- . ':(exclude)package-lock.json' ':(exclude)*.lock' ':(exclude)*.snap'",
                { maxBuffer: 1024 * 1024 * 10 }
              ).toString().slice(0, 3000);
            } catch (e) {
              diff = 'Could not retrieve diff: ' + e.message;
            }

            if (!diff.trim()) {
              diff = 'No code changes detected in this PR.';
            }

            // ── 7. Build review format prompt ─────────────────────────────
            const multiIssueNote = issueNumbers.length > 1
              ? 'Note: This PR covers ' + issueNumbers.length + ' issues (' + issueLabel + '). Review each issue separately.'
              : '';

            let reviewFormat = '';
            if (issueNumbers.length > 1) {
              reviewFormat = 'Since this PR covers multiple issues, structure your review like this:\n\n'
                + 'For each issue, provide a section:\n'
                + '**Issue #N \u2014 [issue title]**\n'
                + '- \u2705 Requirements Met: which acceptance criteria are satisfied\n'
                + '- \u274c Missing / Incomplete: which are not addressed yet\n\n'
                + 'Then a combined section at the end:\n\n'
                + '### \u26a0\ufe0f Code Quality Issues\n'
                + 'Only flag issues specific to THIS project\'s conventions (generic style issues are handled by Copilot code review separately):\n'
                + '- Wrong API response envelope (must use `response.data.data` for most APIs; `response.data` for Assignment APIs only)\n'
                + '- Mock data or hardcoded test data left in production code\n'
                + '- Missing null/undefined guard on API response fields used in arithmetic or rendering\n'
                + '- Hardcoded localhost URLs\n'
                + '- UI not guarded before API response loads (rendering before data arrives)\n'
                + 'Skip if none of the above apply.\n\n'
                + '### \ud83d\udca1 Suggestions\n'
                + 'Optional improvements. Skip if none.\n\n'
                + '### \ud83d\udccb Verdict\n'
                + 'One of: **Ready for human review** / **Needs minor fixes** / **Needs significant work**\n'
                + 'One sentence explaining why.';
            } else {
              reviewFormat = 'Provide your review in this exact format:\n\n'
                + '### \u2705 Requirements Met\n'
                + 'Which acceptance criteria are satisfied.\n\n'
                + '### \u274c Missing or Incomplete\n'
                + 'Which criteria are NOT addressed.\n\n'
                + '### \u26a0\ufe0f Code Quality Issues\n'
                + 'Only flag issues specific to THIS project\'s conventions (generic style issues are handled by Copilot code review separately):\n'
                + '- Wrong API response envelope (must use `response.data.data` for most APIs; `response.data` for Assignment APIs only)\n'
                + '- Mock data or hardcoded test data left in production code\n'
                + '- Missing null/undefined guard on API response fields used in arithmetic or rendering\n'
                + '- Hardcoded localhost URLs\n'
                + '- UI not guarded before API response loads (rendering before data arrives)\n'
                + 'Skip if none of the above apply.\n\n'
                + '### \ud83d\udca1 Suggestions\n'
                + 'Optional improvements. Skip if none.\n\n'
                + '### \ud83d\udccb Verdict\n'
                + 'One of: **Ready for human review** / **Needs minor fixes** / **Needs significant work**\n'
                + 'One sentence explaining why.';
            }

            // ── 8. Call GitHub Models API (GPT-4o) ────────────────────────
            const userPrompt = 'Please review this PR against the linked issue requirements. ' + multiIssueNote + '\n\n'
              + '## Linked Issues / Acceptance Criteria\n' + issueContext + '\n\n'
              + '## PR Title\n' + prTitle + '\n\n'
              + '## Full Content of Changed Files\n'
              + '> Use these to understand the complete implementation — not just what changed.\n'
              + fullFileContents + '\n\n'
              + backendContext + '\n\n'
              + '## Code Diff (for reference)\n```diff\n' + diff + '\n```\n\n'
              + '## Important Context\n'
              + '- This is a React (frontend) + Java Spring Boot (backend) project\n'
              + '- Assignment answer comparison (case-insensitive, FILLIN/UNIQUE types) is handled entirely in the backend — do NOT flag this as a missing frontend implementation\n'
              + '- API responses: most APIs use `response.data.data` envelope, except Assignment APIs which use `response.data` directly\n\n'
              + reviewFormat;

            const response = await fetch(
              'https://models.github.ai/inference/chat/completions',
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN
                },
                body: JSON.stringify({
                  model: 'openai/gpt-4o',
                  messages: [
                    {
                      role: 'system',
                      content: 'You are a senior software engineer doing a pre-review of a pull request for a university group project (React + Java Spring Boot). You have access to the FULL content of changed files, not just the diff — use this to make accurate judgements. Be concise, specific, and actionable. Only flag issues that genuinely exist in the code provided. Do not hallucinate missing implementations if they are handled in backend files or in unchanged files. Use markdown formatting.'
                    },
                    {
                      role: 'user',
                      content: userPrompt
                    }
                  ],
                  max_tokens: 2000
                })
              }
            );

            const data = await response.json();

            // ── 9. Handle API errors ──────────────────────────────────────
            if (!response.ok) {
              console.error('GitHub Models API error:', JSON.stringify(data));
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '## \ud83e\udd16 AI Pre-Review\n\n' + titleWarning + '\u274c AI review failed: `' + (data.error && data.error.message ? data.error.message : JSON.stringify(data)) + '`\n\nCheck the [Actions log](../actions) for details.'
              });
              return;
            }

            const reviewText = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content)
              ? data.choices[0].message.content
              : 'No response received from model.';

            // ── 10. Post PR comment ───────────────────────────────────────
            const issueCountNote = issueNumbers.length > 1
              ? ' \u00b7 **' + issueNumbers.length + ' issues reviewed:** ' + issueLabel
              : ' \u00b7 Linked issue: **' + issueLabel + '**';

            const timestamp = new Date().toUTCString();
            const commentBody = '## \ud83e\udd16 AI Pre-Review Report\n\n'
              + titleWarning
              + '> Model: GPT-4o' + issueCountNote + ' \u00b7 ' + timestamp + '\n\n'
              + '---\n\n'
              + reviewText + '\n\n'
              + '---\n\n'
              + '*Automated pre-review. Please address \u274c and \u26a0\ufe0f items before requesting human review from the leads.*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: commentBody
            });
